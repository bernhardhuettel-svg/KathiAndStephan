        .toast {

        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes toastOut { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(-20px) scale(0.9); } }

        #lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);

                    document.getElementById('ticker-content').innerText = "+++ " + data.text + " +++";

                } else {

                }

        function initFunListeners() {
            onSnapshot(query(collection(db, "highscores"), orderBy("score", "desc"), limit(10)), (snap) => {

                let html = "";

        function initGalleryListener() {

            photoUnsubscribe = onSnapshot(query(collection(db, "photos"), orderBy("time", "desc"), limit(photoLimit)), (snap) => {
                const grid = document.getElementById('photoGrid'); if(!grid) return;
                let html = "";
                
                snap.forEach(d => {
                    const data = d.data();
                    const displayUrl = data.thumb || data.url;
                    html += `
                        <div class="photo-wrapper" onclick="window.showLightbox('${data.url}')">
                            <img src="${displayUrl}" loading="lazy">
                            
                            <button onclick="event.stopPropagation(); window.downloadPhoto('${data.url}')"

        function setupSearchDebounce() {
            document.getElementById('gSearch').oninput = (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const v = e.target.value.toLowerCase().trim();
                    const res = document.getElementById('gRes');
                    
                    if(v.length < 2) { res.innerHTML = ""; return; } 

                    let matches = [];
                    CONFIG.seating.forEach(tisch => {
                        tisch.n.forEach(name => {
                            if(name.toLowerCase().includes(v)) {
                                matches.push(`<span style="font-weight:500; font-size:1.4rem; color:var(--text);">${name}</span><br><span style="color:var(--text-muted); font-size:0.9rem;">Dein Platz:</span> <span style="color:var(--accent); font-weight:600;">${tisch.t}</span>`);
                            }
                        });
                    });

                    if(matches.length > 0) {
                        res.innerHTML = matches.join('<br><br><hr style="width:30px; margin:0 auto; border-color:var(--border-glass);"><br>');
                    } else {
                        res.innerHTML = "Nicht gefunden.";
                    }
                }, 300); 
            };
        }

        window.downloadAllPhotos = async () => {
            if(!confirm("Möchtest du wirklich alle Fotos als ZIP-Datei herunterladen? Bei sehr vielen Bildern kann das einen Moment dauern.")) return;
            
            const zipProgress = document.getElementById('zipProgress');
            const zipBar = document.getElementById('zipBar');
            const zipText = document.getElementById('zipText');
            
            zipProgress.style.display = 'block';
            zipText.style.display = 'block';
            zipBar.style.width = '5%';
            zipText.innerText = 'Lade Bilddatenbank...';

            try {
                const q = query(collection(db, "photos"), orderBy("time", "desc"));
                const querySnapshot = await getDocs(q);
                
                const urls = [];
                querySnapshot.forEach((doc) => {
                    urls.push(doc.data().url);
                });

                if(urls.length === 0) {
                    window.showToast("Es gibt noch keine Fotos zum Herunterladen.");
                    zipProgress.style.display = 'none'; zipText.style.display = 'none';
                    return;
                }

                const zip = new JSZip();
                const folder = zip.folder("Hochzeit_Fotos");
                let count = 0;
                
                for(let i = 0; i < urls.length; i++) {
                    try {
                        const response = await fetch(urls[i]);
                        const blob = await response.blob();
                        const filename = `Hochzeit_Foto_${i+1}.jpg`;
                        folder.file(filename, blob);
                        count++;
                        
                        let percent = Math.floor(5 + (count / urls.length) * 85);
                        zipBar.style.width = percent + '%';
                        zipText.innerText = `Verpacke Bild ${count} von ${urls.length}...`;
                    } catch(err) {
                        console.warn("Konnte Bild nicht zum ZIP hinzufügen:", urls[i]);
                    }
                }
                
                zipText.innerText = 'Erstelle ZIP-Datei... Bitte warten.';
                zipBar.style.width = '95%';

                const content = await zip.generateAsync({type:"blob"});
                saveAs(content, "Hochzeit_Kathi_Stephan.zip");
                
                zipBar.style.width = '100%';
                zipText.innerText = 'Download erfolgreich gestartet!';
                
                setTimeout(() => { 
                    zipProgress.style.display='none'; 
                    zipText.style.display='none'; 
                }, 3000);

            } catch (error) {
                console.error(error);
                window.showToast("Fehler beim Erstellen der ZIP-Datei.");
                zipProgress.style.display = 'none'; 
                zipText.style.display = 'none';
            }
        };

        window.nextMission = () => {
            let nextIdx = lastMissionIdx;
            while(nextIdx === lastMissionIdx) {
                nextIdx = Math.floor(Math.random() * CONFIG.missions.length);
            }
            lastMissionIdx = nextIdx;
            
            const txt = document.getElementById('mTxt');
            if (txt) {
                txt.style.opacity = '0'; 
                setTimeout(() => {
                    txt.innerText = `"${CONFIG.missions[nextIdx]}"`;
                    txt.style.opacity = '1'; 
                }, 200);
            }
        };

        window.startQuiz = () => {
            const n = document.getElementById('qNameInput').value.trim();
            if(!n) { window.showToast("Bitte gib deinen Vornamen ein!"); return; }
            window.qName = n;
            window.qStep = 0;
            window.qScore = 0;
            
            document.getElementById('qStartScreen').style.display = 'none';
            document.getElementById('qActiveScreen').style.display = 'block';
            window.runQuiz();
        };

        window.runQuiz = () => {
            const q = CONFIG.quiz[window.qStep];
            const qc = document.getElementById('qActiveScreen');
            
            if(!q) { 
                qc.innerHTML = `
                    <h3 style='margin-bottom:15px; text-align:center;'>Quiz beendet!</h3>
                    <p style='text-align:center; font-size:1.2rem; margin-bottom:20px; color:var(--text);'>Du hast <b style="color:var(--accent); font-size:1.5rem;">${window.qScore}</b> Punkte erreicht!</p>
                    <button class="btn-action" onclick="window.resetQuiz()">Zurück zur Übersicht</button>
                `;
                
                if(db && window.qName) {
                    addDoc(collection(db, "highscores"), { 
                        name: window.qName, 
                        score: window.qScore, 
                        time: serverTimestamp() 
                    }).catch(e => window.showToast("Fehler beim Speichern."));
                }
                return; 
            }
            
            let optionsHtml = q.o.map((opt, idx) => 
                `<button class="btn-action" style="margin-bottom:10px; text-align:left; padding-left:20px;" onclick="window.answerQ(${idx})">${opt}</button>`
            ).join('');
            
            qc.innerHTML = `
                <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:var(--text-muted); margin-bottom:15px;">
                    <span>Frage ${window.qStep + 1} / ${CONFIG.quiz.length}</span>
                    <span style="font-weight:600; color:var(--accent);">${window.qScore} Pkt</span>
                </div>
                <p style="text-align:left; margin: 0 0 25px 0; font-size: 1.25rem; font-weight: 500; color:var(--text); line-height:1.4;">${q.q}</p>
                ${optionsHtml}
            `;
        };

        window.answerQ = (selectedIndex) => {
            if(selectedIndex === CONFIG.quiz[window.qStep].a) {
                window.qScore++;
            }
            window.qStep++;
            window.runQuiz();
        };

        window.resetQuiz = () => {
            document.getElementById('qActiveScreen').style.display = 'none';
            document.getElementById('qStartScreen').style.display = 'block';
            document.getElementById('qNameInput').value = "";
        };

        window.deleteEntry = async (coll, id) => { 
            if (confirm("Möchtest du diesen Eintrag wirklich löschen?")) {
                try {
                    const { doc, deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
                    await deleteDoc(doc(db, coll, id));
                    window.showToast("✅ Gelöscht!");
                } catch (error) {
                    window.showToast("Fehler beim Löschen.");
                }
            }
        };

        window.downloadPhoto = async (url) => {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = "hochzeit_foto_" + Date.now() + ".jpg";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) { window.open(url, '_blank'); }
        };

        window.uploadPhoto = async (input) => {
            if(!input.files || !input.files[0]) return;
            let file = input.files[0];
            
            const progressContainer = document.getElementById('uploadProgress');
            const progressBar = document.getElementById('uploadBar');
            const progressText = document.getElementById('uploadText');

            progressContainer.style.display = 'block';
            progressBar.style.width = '10%';
            progressText.innerText = 'Vorbereiten...';

            try {
                if(window.imageCompression) {
                    file = await imageCompression(file, { maxSizeMB: 1, maxWidthOrHeight: 1920 });
                }

                progressText.innerText = 'Hochladen...';
                progressBar.style.width = '40%';

                let formData = new FormData();
                formData.append("image", file);

                const response = await fetch("https://api.imgbb.com/1/upload?key=80d19d6d4d10e14c8d276c7d80c63b05&expiration=15552000", {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();

                if(result.success) {
                    progressBar.style.width = '80%';
                    progressText.innerText = 'Speichern...';

                    await addDoc(collection(db, "photos"), { 
                        url: result.data.url, 
                        thumb: result.data.thumb.url,
                        time: serverTimestamp() 
                    });

                    progressBar.style.width = '100%';
                    progressText.innerText = 'Erfolgreich!';
                    window.showToast("✅ Foto hochgeladen!");
                    setTimeout(() => { progressContainer.style.display = 'none'; input.value = ""; }, 2000);
                }
            } catch (error) {
                window.showToast("Fehler beim Hochladen.");
                progressContainer.style.display = 'none';
            }
        };

        window.addWish = async () => {
            const i = document.getElementById('wIn');
            if(!i.value) return;
            await addDoc(collection(db, "guestbook"), { msg: i.value, time: serverTimestamp() });
            i.value = ""; 
            window.showToast("💌 Nachricht gesendet!");
        };

        window.setTicker = async (active) => {
            const txt = document.getElementById('tIn').value || "Willkommen!";
            await setDoc(doc(db, "settings", "ticker"), { active: active, text: txt });
            window.showToast("Ticker aktualisiert!");
        };

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('b-'+id).classList.add('active');
            
            if(id === 'fun') {
                if(!funLoaded && db) { initFunListeners(); funLoaded = true; }
                setTimeout(initGames, 50); 
            }
            if(id === 'info') {
                if(!infoLoaded && db) { initInfoListeners(); infoLoaded = true; }
            }
            if(id === 'gal') {
                if(!galLoaded && db) { initGalleryListener(); galLoaded = true; }
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.adminTrigger = () => {
            adminClicks++;
            if(adminClicks >= 5) {
                adminClicks = 0; 
                if(document.body.classList.contains('admin-mode')) {
                    window.showPage('admin');
                } else {
                    if(prompt("Passcode:") === CONFIG.adminPW) { 
                        document.body.classList.add('admin-mode');
                        window.showPage('admin'); 
                        window.showToast("✅ Admin-Modus aktiv! Lösch-Buttons sichtbar.");
                    }
                }
            }
        };

        function startCountdown() {
            setInterval(() => {
                const diff = new Date(CONFIG.date) - new Date();
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff / 3600000) % 24);
                const m = Math.floor((diff / 60000) % 60);
                const s = Math.floor((diff / 1000) % 60);
                
                const pad = (num) => String(num).padStart(2, '0');
                
                const t = document.getElementById('timer');
                if (t) {
                    t.innerText = diff > 0 
                        ? `${pad(d)}:${pad(h)}:${pad(m)}:${pad(s)}` 
                        : "00:00:00:00";
                }
                
                const now = new Date();
                const start = new Date(CONFIG.date);
                const end = new Date(start.getTime() + 12 * 3600000);
                let p = 0;
                if(now > start) p = Math.min(100, ((now - start) / (end - start)) * 100);
                if(document.getElementById('pBar')) {
                    document.getElementById('pBar').style.width = p + "%";
                    document.getElementById('pText').innerText = now < start ? "Tage · Stunden · Min · Sek" : (p < 100 ? "Live." : "Abgeschlossen.");
                }
                
                let activeIdx = 0;
                let prevH = -1;
                let dayOffset = 0;
                const sItems = document.querySelectorAll('.schedule-item');
                sItems.forEach((item, index) => {
                    const [sh, sm] = item.dataset.time.split(':').map(Number);
                    if (sh < prevH) dayOffset = 1; // Mitternacht überschritten
                    prevH = sh;
                    
                    const sDate = new Date(CONFIG.date);
                    sDate.setDate(sDate.getDate() + dayOffset);
                    sDate.setHours(sh, sm, 0, 0);
                    
                    if (now >= sDate) {
                        activeIdx = index;
                    }
                });
                
                sItems.forEach((i, idx) => {
                    if (idx === activeIdx) i.classList.add('active-schedule');
                    else i.classList.remove('active-schedule');
                });
            }, 1000);
        }

        function initGames() {
            const g = document.getElementById('bGrid');
            if (g && g.innerHTML.trim() === "") { 
                const shuffledBingo = [...CONFIG.bingo].sort(() => 0.5 - Math.random()).slice(0, 9);
                shuffledBingo.forEach(b => {
                    const d = document.createElement('div');
                    d.className = "bingo-cell";
                    d.innerText = b;
                    d.onclick = () => { d.style.background = "var(--text)"; d.style.color = "var(--bg)"; d.style.transform = "scale(0.95)"; };
                    g.appendChild(d);
                });
            }

            const canvas = document.getElementById('scratch');
            const container = document.getElementById('scratch-container');
            
            if (canvas && container.offsetWidth > 0 && !canvas.isInitialized) {
                const ctx = canvas.getContext('2d');
                
                canvas.width = container.offsetWidth;
                canvas.height = container.offsetHeight;

                ctx.fillStyle = '#86868b'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#f5f5f7';
                ctx.font = "bold 18px 'Montserrat', sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("FREIRUBBELN", canvas.width/2, canvas.height/2 + 6);

                let isDrawing = false;

                const scratch = (e) => {
                    if (!isDrawing) return;
                    const rect = canvas.getBoundingClientRect();
                    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.beginPath();
                    ctx.arc(x, y, 25, 0, Math.PI * 2);
                    ctx.fill();
                };

                canvas.addEventListener('mousedown', () => isDrawing = true);
                canvas.addEventListener('touchstart', () => isDrawing = true);
                window.addEventListener('mouseup', () => isDrawing = false);
                window.addEventListener('touchend', () => isDrawing = false);
                canvas.addEventListener('mousemove', scratch);
                canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });
                
                canvas.isInitialized = true; 
            }
        }

        window.onload = init;
    </script>
</body>
</html>
