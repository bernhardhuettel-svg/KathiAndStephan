    <style>
        /* --- APPLE PRO DESIGN SYSTEM --- */
        :root { 
            /* Eukalyptus "Pro" Farbpalette */
            --accent: #789c85;         
            --accent-glow: #567d64;    
            --gold: #c5a872;
            
            /* Light Mode Standard */
            --bg: #f2f4f3;             
            --text: #1d1d1f;           
            --text-muted: #86868b;
            --blob-1: rgba(120, 156, 133, 0.4);
            --blob-2: rgba(197, 168, 114, 0.3);
            
            /* Glassmorphism Variables - Apple Style */
            --card-bg: rgba(255, 255, 255, 0.4); 
            --nav-bg: rgba(255, 255, 255, 0.6);
            --border-glass: rgba(255, 255, 255, 0.5); 
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            --red: #ff3b30; /* iOS Red */
        }
        
        /* Das "Pro" Feeling kommt im Dark Mode am besten zur Geltung */
        [data-theme="dark"] { 
            --bg: #000000;             
            --text: #f5f5f7; 
            --text-muted: #86868b;
            --blob-1: rgba(60, 95, 75, 0.5);
            --blob-2: rgba(120, 95, 50, 0.4);
            
            /* Dark Glass */
            --card-bg: rgba(30, 30, 30, 0.35); 
            --nav-bg: rgba(20, 20, 20, 0.65);
            --border-glass: rgba(255, 255, 255, 0.08); 
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Native Apple Typography */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding-bottom: 120px; 
            overflow-x: hidden; 
            transition: background-color 0.5s ease;
        }

        /* --- AMBIENT BACKGROUND BLOBS --- 
           Das ist das Geheimnis für Apple-Glas: Es muss etwas dahinter leuchten */
        .bg-blobs {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none;
        }
        .blob {
            position: absolute; filter: blur(60px); border-radius: 50%; animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        .blob-1 { top: -10%; left: -10%; width: 60vw; height: 60vw; background: var(--blob-1); animation-delay: 0s; }
        .blob-2 { bottom: 10%; right: -10%; width: 70vw; height: 70vw; background: var(--blob-2); animation-delay: -5s; }
        .blob-3 { top: 40%; left: 40%; width: 50vw; height: 50vw; background: var(--blob-1); animation-duration: 25s; opacity: 0.6; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10vw, 15vh) scale(1.1); }
        }

        /* --- COMPONENTS --- */
        
        /* Dynamic Island Style Ticker */
        #ticker-wrap { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(0,0,0,0.8); color: white; z-index: 6000; height: 35px; border-radius: 20px; display: none; overflow: hidden; font-weight: 600; line-height: 35px; font-size: 0.8rem; letter-spacing: 0.5px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        [data-theme="light"] #ticker-wrap { background: rgba(255,255,255,0.8); color: black; border: 1px solid rgba(0,0,0,0.1); }
        .ticker-text { display: inline-block; white-space: nowrap; padding-left: 100%; animation: ticker 15s linear infinite; text-transform: uppercase; }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .theme-toggle { position: absolute; top: 25px; right: 25px; font-size: 1.4rem; cursor: pointer; z-index: 6500; opacity: 0.8; }

        /* Apple Dock / Navigation */
        nav { 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 400px;
            background: var(--nav-bg); 
            backdrop-filter: blur(35px) saturate(180%); 
            -webkit-backdrop-filter: blur(35px) saturate(180%);
            display: flex; justify-content: space-around; 
            padding: 12px 5px 8px 5px; 
            border-radius: 35px; 
            box-shadow: var(--shadow); 
            z-index: 4000; 
            border: 1px solid var(--border-glass); 
        }
        nav button { background: none; border: none; color: var(--text-muted); font-size: 0.65rem; font-weight: 600; cursor: pointer; flex: 1; display: flex; flex-direction: column; align-items: center; letter-spacing: 0.3px; transition: color 0.3s ease; }
        nav button.active { color: var(--accent); }
        nav button span { font-size: 1.5rem; margin-bottom: 4px; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        nav button.active span { transform: translateY(-4px) scale(1.15); }

        .page { display: none; padding: 80px 20px 20px; animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); max-width: 600px; margin: 0 auto; }
        .page.active { display: block; }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        /* THE ULTIMATE APPLE GLASS CARDS */
        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border-radius: 28px; 
            padding: 28px; 
            margin-bottom: 24px; 
            border: 1px solid var(--border-glass); 
            box-shadow: var(--shadow); 
            position: relative; 
            overflow: hidden;
            transition: background 0.3s ease, border 0.3s ease;
        }
        
        .card-accent { 
            background: linear-gradient(135deg, var(--accent), var(--accent-glow)); 
            color: white; 
            border: 1px solid rgba(255,255,255,0.2); 
            box-shadow: 0 15px 35px rgba(120, 156, 133, 0.25);
        }
        .card-accent h3, .card-accent p { color: white !important; }
        
        /* Pro Typography */
        h1, h2, h3 { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin-top: 0; letter-spacing: -0.03em; font-weight: 700; }
        h1 { font-size: 2.8rem; text-align: center; background: linear-gradient(135deg, var(--accent), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; padding-bottom: 5px; }
        h2 { font-size: 2rem; color: var(--text); margin-bottom: 25px; }
        h3 { font-size: 1.3rem; color: var(--text); margin-bottom: 15px; }
        p { line-height: 1.5; font-size: 0.95rem; }
        
        /* iOS Inputs */
        input, textarea {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-glass);
            color: var(--text);
            font-family: inherit;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }
        [data-theme="light"] input, [data-theme="light"] textarea { background: rgba(0, 0, 0, 0.03); }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); background: rgba(255, 255, 255, 0.2); box-shadow: 0 0 0 4px rgba(120, 156, 133, 0.15); }
        
        /* Apple Buttons */
        .btn-action { 
            background: var(--accent); color: white; border: none; padding: 16px; border-radius: 18px; font-weight: 600; font-size: 1rem; width: 100%; cursor: pointer; letter-spacing: 0.5px; box-shadow: 0 4px 15px rgba(120, 156, 133, 0.3); transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s; 
        }
        .btn-action:active { transform: scale(0.96); opacity: 0.8; }
        
        /* Delete Button - System Red */
        .btn-del { position: absolute; top: 12px; right: 12px; background: rgba(255, 59, 48, 0.9); backdrop-filter: blur(10px); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-weight: bold; cursor: pointer; display: block; z-index: 100; box-shadow: 0 4px 10px rgba(255, 59, 48, 0.3); font-size: 12px; }
        .song-item .btn-del { position: relative; top: 0; right: 0; width: 26px; height: 26px; font-size: 11px; margin-left: 10px; box-shadow: none; }

        /* Sleek Timeline */
        .timeline-item { border-left: 2px solid var(--border-glass); padding-left: 20px; position: relative; margin-bottom: 25px; transition: all 0.3s ease; }
        .timeline-item::after { content: ''; position: absolute; left: -5px; top: 4px; width: 8px; height: 8px; background: var(--text-muted); border-radius: 50%; box-shadow: 0 0 0 4px var(--card-bg); transition: all 0.3s; }
        
        .timeline-item.active-schedule { border-left-color: var(--accent); }
        .timeline-item.active-schedule::after { background: var(--accent); box-shadow: 0 0 0 4px rgba(120, 156, 133, 0.2); transform: scale(1.2); }

        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 7000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text); transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .song-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; border-bottom: 1px solid var(--border-glass); position: relative; font-size: 0.95rem; }
        .song-item:last-child { border-bottom: none; }
        .vote-badge { background: rgba(120, 156, 133, 0.15); color: var(--accent); padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; margin-right: 12px; border: 1px solid rgba(120, 156, 133, 0.3); }

        #bGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .bingo-cell { aspect-ratio: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); border-radius: 16px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 0.8rem; padding: 5px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        [data-theme="light"] .bingo-cell { background: rgba(255,255,255,0.5); }

        #photoGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .photo-wrapper { position: relative; width: 100%; aspect-ratio: 1; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .photo-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .photo-wrapper:active img { transform: scale(1.08); }
        
        hr { border: none; border-top: 1px solid var(--border-glass); margin: 15px 0; }
        
        /* Custom Progress Bar iOS Style */
        .progress-track { background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; overflow: hidden; margin-top: 15px; border: 1px solid var(--border-glass); }
        [data-theme="light"] .progress-track { background: rgba(0,0,0,0.05); }
        #pBar { background: linear-gradient(90deg, var(--accent), var(--gold)); height: 100%; width: 0%; transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 4px; }
    </style>
</head>

                   <div class="card">
                        <h3 style="text-align:left;">Rubbellos</h3>
                        <div id="scratch-container" style="position:relative; background:rgba(0,0,0,0.1); height:150px; border-radius:20px; display:flex; align-items:center; justify-content:center; overflow:hidden; margin-top: 15px; border: 1px solid var(--border-glass);">
                            <span style="font-weight:700; color:var(--text); font-size:1.3rem; text-align:center; line-height:1.4;">GEWINN:<br><span style="color:var(--accent);">1x SCHNAPS! 🥃</span></span>
                            <canvas id="scratch" style="position:absolute; top:0; left:0; width:100%; height:100%; cursor:crosshair; touch-action:none;"></canvas>
                        </div>
                    </div>
                </main>

                <main id="gal" class="page">
                    <h2>Galerie</h2>
                    <div class="card">
                        <p style="text-align:center; color:var(--text-muted); font-size:0.95rem; margin-top:0;">Lade deine Fotos direkt hoch.</p>
                        
                        <div style="position: relative; overflow: hidden; display: inline-block; width: 100%; margin-bottom: 15px; margin-top: 10px;">
                            <button class="btn-action" style="pointer-events: none; background: rgba(255,255,255,0.1); color: var(--text); border: 1px solid var(--border-glass); backdrop-filter: blur(10px);">Foto auswählen</button>
                            <input type="file" id="fileInput" accept="image/*" onchange="window.uploadPhoto(this)" style="position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;">
                        </div>
                        
                        <div id="uploadProgress" style="display: none; width: 100%; background: rgba(0,0,0,0.1); border-radius: 4px; height: 6px; overflow: hidden; margin-top: 10px;">
                            <div id="uploadBar" style="background: var(--accent); height: 100%; width: 0%; transition: width 0.3s;"></div>
                        </div>
                        <p id="uploadText" style="text-align: center; font-size: 0.85rem; margin-top: 10px; font-weight: 500; color: var(--text);"></p>
                        
                        <div id="photoGrid"></div>
                    </div>
                </main>

                <main id="info" class="page">
                    <h2>Infos</h2>
                    <div class="card">
                        <h3 style="text-align:left;">Gästebuch</h3>
                        <textarea id="wIn" placeholder="Schreibe uns eine Nachricht..." style="width:100%; height:120px; border-radius:16px; padding:15px; font-size:1rem; margin-top:10px; resize:none;"></textarea>
                        <button class="btn-action" onclick="window.addWish()">Senden</button>
                        <div id="wList" style="margin-top:25px;"></div>
                    </div>
                    
                    <div class="card">
                        <h3 style="text-align:left;">Location & WLAN</h3>
                            <div style="padding: 15px 0; border-bottom: 1px solid var(--border-glass);">
                                <p style="margin:0 0 5px 0; color:var(--text-muted); font-size:0.85rem;">Adresse</p>
                                <p style="margin:0; font-weight:500; font-size:1rem;">${CONFIG.location}</p>
                            </div>
                            
                            <button class="btn-action" style="background:rgba(255,255,255,0.1); color:var(--text); border:1px solid var(--border-glass); margin: 15px 0 25px 0;" 
                                onclick="window.open('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(CONFIG.location), '_blank')">
                                In Karten öffnen
                            </button>
                        
                            <div style="padding: 15px 0; border-bottom: 1px solid var(--border-glass);">
                                <p style="margin:0 0 5px 0; color:var(--text-muted); font-size:0.85rem;">WLAN</p>
                                <p style="margin:0; font-weight:500; font-size:1rem;">Netz: ${CONFIG.wlan.ssid}<br>Passwort: ${CONFIG.wlan.pw}</p>
                            </div>
                            
                            <button class="btn-action" style="margin-top: 15px;" onclick="location.href='tel:${CONFIG.taxi}'">
                                Taxi rufen
                            </button>
                        </div>
                </main>

                <main id="admin" class="page">
                    <div class="card" style="border:1px solid var(--red);">
                        <h2 style="color:var(--red);">Admin Konsole</h2>
                        <input type="text" id="tIn" placeholder="Live-Ticker Text..." style="width:100%; padding:15px; margin-bottom:15px; border-radius:16px;">
                        <button class="btn-action" style="background:var(--accent);" onclick="window.setTicker(true)">Ticker aktivieren</button>
                        <button class="btn-action" style="background:rgba(255,255,255,0.1); color:var(--text); border:1px solid var(--border-glass);" onclick="window.setTicker(false)">Ticker aus</button>
                        <button class="btn-action" style="background:var(--red); margin-top:30px;" onclick="location.reload()">Beenden</button>
                    </div>
                </main>
            `;
            initGames();
        }

        function setupFirebase() {
            onSnapshot(doc(db, "settings", "ticker"), (d) => {
                const data = d.data();
                const wrap = document.getElementById('ticker-wrap');
                if(data?.active) {
                    document.getElementById('ticker-content').innerText = "+++ " + data.text + " +++";
                    wrap.style.display = 'block';
                } else {
                    wrap.style.display = 'none';
                }
            });

            onSnapshot(query(collection(db, "jukebox"), orderBy("votes", "desc")), (snap) => {
                const list = document.getElementById('sList'); if(!list) return;
                list.innerHTML = "";
                snap.forEach(d => {
                    const s = d.data();
                    list.innerHTML += `<div class="song-item">
                        <span style="flex:1; padding-right:10px;"><span class="vote-badge">${s.votes || 0}</span> <b style="font-weight:600;">${s.song}</b></span>
                        <div style="display:flex; align-items:center;">
                            <button onclick="window.voteSong('${d.id}')" style="border:0; background:none; color:var(--text); cursor:pointer; font-size:1.3rem;">+</button>
                            <button class="btn-del" onclick="window.deleteEntry('jukebox','${d.id}')">✕</button>
                        </div>
                    </div>`;
                });
            });

            onSnapshot(query(collection(db, "photos"), orderBy("time", "desc")), (snap) => {
                const grid = document.getElementById('photoGrid'); if(!grid) return;
                grid.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const displayUrl = data.thumb || data.url;
                    grid.innerHTML += `
                        <div class="photo-wrapper">
                            <img src="${displayUrl}" loading="lazy" onclick="window.open('${data.url}', '_blank')">
                            
                            <button onclick="window.downloadPhoto('${data.url}')" 
                                    style="position: absolute; bottom: 8px; right: 8px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; width: 34px; height: 34px; cursor: pointer; font-size: 16px; z-index: 10; display: flex; align-items: center; justify-content: center;">
                                ↓
                            </button>
                            
                            <button class="btn-del" onclick="window.deleteEntry('photos','${d.id}')">
                                ✕
                            </button>
                         </div>`;
                });
            });

            onSnapshot(query(collection(db, "guestbook"), orderBy("time", "desc")), (snap) => {
                const list = document.getElementById('wList'); if(!list) return;
                list.innerHTML = "";
                snap.forEach(d => {
                    list.innerHTML += `<div style="padding:20px; margin-bottom:15px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); position:relative;">
                        <p style="margin:0; line-height: 1.5; padding-right: 25px; font-size:0.95rem;">${d.data().msg}</p>
                        <button class="btn-del" style="top:15px; right:15px; width:22px; height:22px; font-size:9px;" onclick="window.deleteEntry('guestbook','${d.id}')">✕</button>
                    </div>`;
                });
            });

            document.getElementById('gSearch').oninput = (e) => {
                const v = e.target.value.toLowerCase().trim();
                const res = document.getElementById('gRes');
                
                if(v.length < 2) { res.innerHTML = ""; return; } 

                let matches = [];
                CONFIG.seating.forEach(tisch => {
                    tisch.n.forEach(name => {
                        if(name.toLowerCase().includes(v)) {
                            matches.push(`<span style="font-weight:600; font-size:1.2rem;">${name}</span><br><span style="color:var(--text-muted); font-size:0.9rem;">Du sitzt an</span><br><span style="color:var(--accent); font-weight:700;">${tisch.t}</span>`);
                        }
                    });
                });

                if(matches.length > 0) {
                    res.innerHTML = matches.join('<br><br><hr style="width:50%; margin:0 auto;"><br>');
                } else {
                    res.innerHTML = "Nicht gefunden.";
                }
            };
        }

        window.deleteEntry = async (coll, id) => { 
            if (confirm("Beitrag für alle entfernen?")) {
                try {
                    const { doc, deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
                    await deleteDoc(doc(db, coll, id));
                } catch (error) {
                    alert("Fehler beim Löschen.");
                }
            }
        };

        window.downloadPhoto = async (url) => {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = "hochzeit_foto_" + Date.now() + ".jpg";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) { window.open(url, '_blank'); }
        };

        window.uploadPhoto = async (input) => {
            if(!input.files || !input.files[0]) return;
            let file = input.files[0];
            
            const progressContainer = document.getElementById('uploadProgress');
            const progressBar = document.getElementById('uploadBar');
            const progressText = document.getElementById('uploadText');

            progressContainer.style.display = 'block';
            progressBar.style.width = '10%';
            progressText.innerText = 'Vorbereiten...';

            try {
                if(window.imageCompression) {
                    file = await imageCompression(file, { maxSizeMB: 1, maxWidthOrHeight: 1920 });
                }

                progressText.innerText = 'Hochladen...';
                progressBar.style.width = '40%';

                let formData = new FormData();
                formData.append("image", file);

                const response = await fetch("https://api.imgbb.com/1/upload?key=80d19d6d4d10e14c8d276c7d80c63b05&expiration=15552000", {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();

                if(result.success) {
                    progressBar.style.width = '80%';
                    progressText.innerText = 'Speichern...';

                    await addDoc(collection(db, "photos"), { 
                        url: result.data.url, 
                        thumb: result.data.thumb.url,
                        time: serverTimestamp() 
                    });

                    progressBar.style.width = '100%';
                    progressText.innerText = 'Erfolgreich!';
                    setTimeout(() => { progressContainer.style.display = 'none'; input.value = ""; }, 2500);
                }
            } catch (error) {
                alert("Fehler beim Upload.");
                progressContainer.style.display = 'none';
            }
        };

        window.voteSong = async (id) => { try { await updateDoc(doc(db, "jukebox", id), { votes: increment(1) }); } catch(e){} };
        window.addSong = async () => {
            const i = document.getElementById('sIn');
            if(!i.value) return;
            await addDoc(collection(db, "jukebox"), { song: i.value, votes: 1, time: serverTimestamp() });
            i.value = "";
        };

        window.addWish = async () => {
            const i = document.getElementById('wIn');
            if(!i.value) return;
            await addDoc(collection(db, "guestbook"), { msg: i.value, time: serverTimestamp() });
            i.value = ""; alert("Gesendet!");
        };

        window.setTicker = async (active) => {
            const txt = document.getElementById('tIn').value || "Willkommen!";
            await setDoc(doc(db, "settings", "ticker"), { active: active, text: txt });
        };

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('b-'+id).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if(id === 'fun') setTimeout(initGames, 100);
        };

        window.adminTrigger = () => {
            adminClicks++;
            if(adminClicks >= 5) {
                if(prompt("Code:") === CONFIG.adminPW) { window.showPage('admin'); }
                adminClicks = 0;
            }
        };

        function startCountdown() {
            setInterval(() => {
                const diff = new Date(CONFIG.date) - new Date();
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff / 3600000) % 24);
                const m = Math.floor((diff / 60000) % 60);
                const s = Math.floor((diff / 1000) % 60);
                
                const pad = (num) => String(num).padStart(2, '0');
                
                const t = document.getElementById('timer');
                if (t) {
                    t.innerText = diff > 0 
                        ? `${d} TAGE | ${pad(h)}:${pad(m)}:${pad(s)}` 
                        : "Die Party läuft.";
                }
                
                const now = new Date();
                const start = new Date(CONFIG.date);
                const end = new Date(start.getTime() + 12 * 3600000);
                let p = 0;
                if(now > start) p = Math.min(100, ((now - start) / (end - start)) * 100);
                if(document.getElementById('pBar')) {
                    document.getElementById('pBar').style.width = p + "%";
                    document.getElementById('pText').innerText = now < start ? "Vorbereitungen..." : (p < 100 ? "Wir feiern." : "Abgeschlossen.");
                }
                
                document.querySelectorAll('.schedule-item').forEach(item => {
                    const [sh, sm] = item.dataset.time.split(':');
                    const sTime = new Date(now).setHours(sh, sm, 0);
                    if(now >= sTime) {
                        document.querySelectorAll('.schedule-item').forEach(i => i.classList.remove('active-schedule'));
                        item.classList.add('active-schedule');
                    }
                });
            }, 1000);
        }

        window.nextMission = () => {
            const m = CONFIG.missions[Math.floor(Math.random()*CONFIG.missions.length)];
            document.getElementById('mTxt').innerText = `"${m}"`;
        };

        window.runQuiz = () => {
            const q = CONFIG.quiz[window.qStep];
            if(!q) { document.getElementById('qBox').innerHTML = "<h3 style='margin-bottom:15px; text-align:left;'>Quiz beendet</h3><p style='text-align:center;'>Alle Fragen beantwortet.</p>"; return; }
            document.getElementById('qTxt').innerText = q.q;
            document.getElementById('qOpts').innerHTML = q.o.map(o => `<button class="btn-action" style="background:rgba(255,255,255,0.1); color:var(--text); border:1px solid var(--border-glass); box-shadow:none; margin-bottom:10px;" onclick="window.nextQ()">${o}</button>`).join('');
        };
        window.nextQ = () => { window.qStep++; window.runQuiz(); };

        function initGames() {
            const g = document.getElementById('bGrid');
            if (g) {
                g.innerHTML = ""; 
                const shuffledBingo = [...CONFIG.bingo].sort(() => 0.5 - Math.random()).slice(0, 9);
                shuffledBingo.forEach(b => {
                    const d = document.createElement('div');
                    d.className = "bingo-cell";
                    d.innerText = b;
                    d.onclick = () => { d.style.background = "var(--accent)"; d.style.color = "white"; d.style.transform = "scale(0.95)"; d.style.borderColor = "var(--accent)"; };
                    g.appendChild(d);
                });
            }

            const canvas = document.getElementById('scratch');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                const container = document.getElementById('scratch-container');
                
                canvas.width = container.offsetWidth;
                canvas.height = container.offsetHeight;

                /* Apple Style Rubbellos-Oberfläche (Metallic/Frosted Glass look) */
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, '#567d64');
                gradient.addColorStop(0.5, '#789c85');
                gradient.addColorStop(1, '#567d64');
                ctx.fillStyle = gradient; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.font = "bold 18px -apple-system, BlinkMacSystemFont, sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("FREIRUBBELN", canvas.width/2, canvas.height/2 + 6);

                let isDrawing = false;

                const scratch = (e) => {
                    if (!isDrawing) return;
                    const rect = canvas.getBoundingClientRect();
                    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.beginPath();
                    ctx.arc(x, y, 22, 0, Math.PI * 2);
                    ctx.fill();
                };

                canvas.addEventListener('mousedown', () => isDrawing = true);
                canvas.addEventListener('touchstart', () => isDrawing = true);
                window.addEventListener('mouseup', () => isDrawing = false);
                window.addEventListener('touchend', () => isDrawing = false);
                canvas.addEventListener('mousemove', scratch);
                canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });
            }
        }

        window.onload = init;
    </script>
</body>
</html>
