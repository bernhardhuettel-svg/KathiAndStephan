            --surface: rgba(255, 255, 255, 0.6); 
            --text: #1d1d1f; 
            --text-muted: #86868b;
            --border-glass: rgba(0, 0, 0, 0.05);
            --nav-bg: rgba(255, 255, 255, 0.8);
            --aura: radial-gradient(circle at 50% 30%, rgba(130, 154, 138, 0.15) 0%, transparent 60%);
        }
        
        [data-theme="dark"] { 
            --bg: #000000; 
            --surface: rgba(28, 28, 30, 0.4); 
            --text: #f5f5f7; 
            --text-muted: #86868b;
            --border-glass: rgba(255, 255, 255, 0.08);

        nav {

        .song-item .btn-del { position: relative; top: 0; right: 0; width: 26px; height: 26px; font-size: 11px; margin-left: 10px; }

        .timeline { display: flex; flex-direction: column; gap: 15px; }
        .timeline-item { display: flex; align-items: flex-start; gap: 15px; }
        .timeline-time { font-weight: 600; font-variant-numeric: tabular-nums; min-width: 50px; color: var(--text); }
        .timeline-event { color: var(--text-muted); }
        .active-schedule .timeline-time, .active-schedule .timeline-event { color: var(--accent); }

        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 7000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
        
        .song-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-glass); font-size: 1rem; }
        .song-item:last-child { border-bottom: none; }
        .vote-badge { background: var(--border-glass); color: var(--text); padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; margin-right: 12px; font-variant-numeric: tabular-nums;}

        .bingo-cell { aspect-ratio: 1; background: var(--border-glass); border-radius: 14px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 0.85rem; padding: 5px; cursor: pointer; font-weight: 600; transition: all 0.2s; }

        .photo-wrapper { position: relative; width: 100%; aspect-ratio: 1; border-radius: 16px; overflow: hidden; background: var(--border-glass); }

</head>

                            <span style="font-weight:700; color:var(--text); font-size:1.3rem; text-align:center; line-height:1.4;">GEWINN:<br><span style="color:var(--accent);">1x SCHNAPS! 🥃</span></span>
                            <canvas id="scratch" style="position:absolute; top:0; left:0; width:100%; height:100%; cursor:crosshair; touch-action:none;"></canvas>
                        </div>
                    </div>
                </main>

                <main id="gal" class="page">
                    <h1>Galerie</h1>
                    <div class="card">
                        <p style="text-align:center; margin-top:0;">Teile deine Fotos mit uns.</p>
                        
                        <div style="position: relative; overflow: hidden; display: inline-block; width: 100%; margin-bottom: 10px; margin-top: 10px;">
                            <button class="btn-action secondary" style="pointer-events: none;">Foto auswählen</button>
                            <input type="file" id="fileInput" accept="image/*" onchange="window.uploadPhoto(this)" style="position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;">
                        </div>
                        
                        <div id="uploadProgress" style="display: none; width: 100%; background: var(--border-glass); border-radius: 3px; height: 6px; overflow: hidden; margin-top: 10px;">
                            <div id="uploadBar" style="background: var(--text); height: 100%; width: 0%; transition: width 0.3s;"></div>
                        </div>
                        <p id="uploadText" style="text-align: center; font-size: 0.85rem; margin-top: 10px; font-weight: 500;"></p>
                        
                        <div id="photoGrid"></div>
                    </div>
                </main>

                <main id="info" class="page">
                    <h1>Infos</h1>
                    <div class="card">
                        <h3>Gästebuch</h3>
                        <textarea id="wIn" placeholder="Hinterlasse eine Nachricht..." style="height:120px; margin-top:10px; resize:none;"></textarea>
                        <button class="btn-action" style="margin-top:10px;" onclick="window.addWish()">Senden</button>
                        <div id="wList" style="margin-top:25px;"></div>
                    </div>
                    
                    <div class="card">
                        <h3>Location & WLAN</h3>
                            <div style="padding: 15px 0; border-bottom: 1px solid var(--border-glass);">
                                <p style="margin:0 0 5px 0; font-size:0.85rem;">Adresse</p>
                                <p style="margin:0; font-weight:500; font-size:1rem; color:var(--text);">${CONFIG.location}</p>
                            </div>
                            
                            <button class="btn-action secondary" style="margin: 15px 0 25px 0;" 
                                onclick="window.open('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(CONFIG.location), '_blank')">
                                In Karten öffnen
                            </button>
                        
                            <div style="padding: 15px 0; border-bottom: 1px solid var(--border-glass);">
                                <p style="margin:0 0 5px 0; font-size:0.85rem;">WLAN</p>
                                <p style="margin:0; font-weight:500; font-size:1rem; color:var(--text);">Netz: ${CONFIG.wlan.ssid}<br>Passwort: ${CONFIG.wlan.pw}</p>
                            </div>
                            
                            <button class="btn-action secondary" style="margin-top: 15px;" onclick="location.href='tel:${CONFIG.taxi}'">
                                Taxi rufen
                            </button>
                        </div>
                </main>

                <main id="admin" class="page">
                    <div class="card" style="border:1px solid #ff3b30;">
                        <h3 style="color:#ff3b30;">Admin Konsole</h3>
                        <input type="text" id="tIn" placeholder="Live-Ticker Text..." style="margin-bottom:15px;">
                        <button class="btn-action" onclick="window.setTicker(true)">Ticker aktivieren</button>
                        <button class="btn-action secondary" style="margin-top:10px;" onclick="window.setTicker(false)">Ticker aus</button>
                        <button class="btn-action" style="background:#ff3b30; color:white; margin-top:30px;" onclick="location.reload()">Beenden</button>
                    </div>
                </main>
            `;
            initGames();
        }

        function setupFirebase() {
            onSnapshot(doc(db, "settings", "ticker"), (d) => {
                const data = d.data();
                const wrap = document.getElementById('ticker-wrap');
                if(data?.active) {
                    document.getElementById('ticker-content').innerText = "+++ " + data.text + " +++";
                    wrap.style.display = 'block';
                } else {
                    wrap.style.display = 'none';
                }
            });

            // HIGHSCORE LISTENER
            onSnapshot(query(collection(db, "highscores"), orderBy("score", "desc"), orderBy("time", "asc"), limit(10)), (snap) => {
                const list = document.getElementById('hsList'); if(!list) return;
                list.innerHTML = "";
                let rank = 1;
                snap.forEach(d => {
                    const s = d.data();
                    list.innerHTML += `<div class="hs-item">
                        <span class="hs-rank">${rank}.</span>
                        <span class="hs-name">${s.name}</span>
                        <span class="hs-score">${s.score} Pkt.</span>
                    </div>`;
                    rank++;
                });
                if(list.innerHTML === "") list.innerHTML = "<p style='font-size:0.9rem;'>Noch keine Einträge. Sei der Erste!</p>";
            });

            onSnapshot(query(collection(db, "jukebox"), orderBy("votes", "desc")), (snap) => {
                const list = document.getElementById('sList'); if(!list) return;
                list.innerHTML = "";
                snap.forEach(d => {
                    const s = d.data();
                    list.innerHTML += `<div class="song-item">
                        <span style="flex:1; padding-right:10px;"><span class="vote-badge">${s.votes || 0}</span> <b style="font-weight:600; color:var(--text);">${s.song}</b></span>
                        <div style="display:flex; align-items:center;">
                            <button onclick="window.voteSong('${d.id}')" style="border:0; background:none; color:var(--text); cursor:pointer; font-size:1.4rem;">+</button>
                            <button class="btn-del" onclick="window.deleteEntry('jukebox','${d.id}')">✕</button>
                        </div>
                    </div>`;
                });
            });

            onSnapshot(query(collection(db, "photos"), orderBy("time", "desc")), (snap) => {
                const grid = document.getElementById('photoGrid'); if(!grid) return;
                grid.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const displayUrl = data.thumb || data.url;
                    grid.innerHTML += `
                        <div class="photo-wrapper">
                            <img src="${displayUrl}" loading="lazy" onclick="window.open('${data.url}', '_blank')">
                            
                            <button onclick="window.downloadPhoto('${data.url}')" 
                                    style="position: absolute; bottom: 8px; right: 8px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; width: 34px; height: 34px; cursor: pointer; font-size: 16px; z-index: 10; display: flex; align-items: center; justify-content: center;">
                                ↓
                            </button>
                            
                            <button class="btn-del" onclick="window.deleteEntry('photos','${d.id}')">
                                ✕
                            </button>
                         </div>`;
                });
            });

            onSnapshot(query(collection(db, "guestbook"), orderBy("time", "desc")), (snap) => {
                const list = document.getElementById('wList'); if(!list) return;
                list.innerHTML = "";
                snap.forEach(d => {
                    list.innerHTML += `<div style="padding:20px; margin-bottom:15px; border-radius: 16px; background: var(--border-glass); position:relative;">
                        <p style="margin:0; line-height: 1.5; padding-right: 25px; color:var(--text);">${d.data().msg}</p>
                        <button class="btn-del" style="top:15px; right:15px; width:22px; height:22px; font-size:10px;" onclick="window.deleteEntry('guestbook','${d.id}')">✕</button>
                    </div>`;
                });
            });

            document.getElementById('gSearch').oninput = (e) => {
                const v = e.target.value.toLowerCase().trim();
                const res = document.getElementById('gRes');
                
                if(v.length < 2) { res.innerHTML = ""; return; } 

                let matches = [];
                CONFIG.seating.forEach(tisch => {
                    tisch.n.forEach(name => {
                        if(name.toLowerCase().includes(v)) {
                            matches.push(`<span style="font-weight:700; font-size:1.4rem; color:var(--text);">${name}</span><br><span style="color:var(--text-muted); font-size:0.9rem;">Dein Platz:</span> <span style="color:var(--accent); font-weight:700;">${tisch.t}</span>`);
                        }
                    });
                });

                if(matches.length > 0) {
                    res.innerHTML = matches.join('<br><br><hr style="width:30px; margin:0 auto; border-color:var(--border-glass);"><br>');
                } else {
                    res.innerHTML = "Nicht gefunden.";
                }
            };
        }

        // --- QUIZ LOGIK ---
        window.startQuiz = () => {
            const n = document.getElementById('qNameInput').value.trim();
            if(!n) { alert("Bitte gib deinen Namen ein, um Punkte zu sammeln!"); return; }
            window.qName = n;
            window.qStep = 0;
            window.qScore = 0;
            window.runQuiz();
        };

        window.runQuiz = () => {
            const q = CONFIG.quiz[window.qStep];
            const qc = document.getElementById('qContent');
            
            if(!q) { 
                // Quiz Ende
                qc.innerHTML = `
                    <h3 style='margin-bottom:15px; text-align:center;'>Quiz beendet!</h3>
                    <p style='text-align:center; font-size:1.2rem; margin-bottom:20px;'>Du hast <b style="color:var(--accent);">${window.qScore}</b> von ${CONFIG.quiz.length} Punkten!</p>
                    <button class="btn-action" onclick="window.resetQuiz()">Zurück zur Übersicht</button>
                `;
                
                // Score in Firebase speichern
                if(db && window.qName) {
                    addDoc(collection(db, "highscores"), { 
                        name: window.qName, 
                        score: window.qScore, 
                        time: serverTimestamp() 
                    }).catch(e => console.log("Fehler beim Speichern:", e));
                }
                return; 
            }
            
            let optionsHtml = q.o.map((opt, idx) => 
                `<button class="btn-action secondary" style="margin-bottom:10px; font-weight:500;" onclick="window.answerQ(${idx})">${opt}</button>`
            ).join('');
            
            qc.innerHTML = `
                <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:var(--text-muted); margin-bottom:15px;">
                    <span>Frage ${window.qStep + 1} / ${CONFIG.quiz.length}</span>
                    <span style="font-weight:700; color:var(--accent);">${window.qScore} Punkte</span>
                </div>
                <p style="text-align:center; margin: 0 0 25px 0; font-size: 1.3rem; font-weight: 600; color:var(--text); line-height:1.4;">${q.q}</p>
                ${optionsHtml}
            `;
        };

        window.answerQ = (selectedIndex) => {
            if(selectedIndex === CONFIG.quiz[window.qStep].a) {
                window.qScore++; // Punkt für richtige Antwort
            }
            window.qStep++;
            window.runQuiz();
        };

        window.resetQuiz = () => {
            // Lädt den Tab neu, damit der Highscore wieder angezeigt wird
            window.showPage('fun');
        };
        // --- ENDE QUIZ LOGIK ---


        window.deleteEntry = async (coll, id) => { 
            if (confirm("Beitrag löschen?")) {
                try {
                    const { doc, deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
                    await deleteDoc(doc(db, coll, id));
                } catch (error) {
                    alert("Fehler.");
                }
            }
        };

        window.downloadPhoto = async (url) => {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = "hochzeit_foto_" + Date.now() + ".jpg";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) { window.open(url, '_blank'); }
        };

        window.uploadPhoto = async (input) => {
            if(!input.files || !input.files[0]) return;
            let file = input.files[0];
            
            const progressContainer = document.getElementById('uploadProgress');
            const progressBar = document.getElementById('uploadBar');
            const progressText = document.getElementById('uploadText');

            progressContainer.style.display = 'block';
            progressBar.style.width = '10%';
            progressText.innerText = 'Vorbereiten...';

            try {
                if(window.imageCompression) {
                    file = await imageCompression(file, { maxSizeMB: 1, maxWidthOrHeight: 1920 });
                }

                progressText.innerText = 'Hochladen...';
                progressBar.style.width = '40%';

                let formData = new FormData();
                formData.append("image", file);

                const response = await fetch("https://api.imgbb.com/1/upload?key=80d19d6d4d10e14c8d276c7d80c63b05&expiration=15552000", {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();

                if(result.success) {
                    progressBar.style.width = '80%';
                    progressText.innerText = 'Speichern...';

                    await addDoc(collection(db, "photos"), { 
                        url: result.data.url, 
                        thumb: result.data.thumb.url,
                        time: serverTimestamp() 
                    });

                    progressBar.style.width = '100%';
                    progressText.innerText = 'Erfolgreich!';
                    setTimeout(() => { progressContainer.style.display = 'none'; input.value = ""; }, 2000);
                }
            } catch (error) {
                alert("Fehler.");
                progressContainer.style.display = 'none';
            }
        };

        window.voteSong = async (id) => { try { await updateDoc(doc(db, "jukebox", id), { votes: increment(1) }); } catch(e){} };
        window.addSong = async () => {
            const i = document.getElementById('sIn');
            if(!i.value) return;
            await addDoc(collection(db, "jukebox"), { song: i.value, votes: 1, time: serverTimestamp() });
            i.value = "";
        };

        window.addWish = async () => {
            const i = document.getElementById('wIn');
            if(!i.value) return;
            await addDoc(collection(db, "guestbook"), { msg: i.value, time: serverTimestamp() });
            i.value = ""; alert("Gesendet!");
        };

        window.setTicker = async (active) => {
            const txt = document.getElementById('tIn').value || "Willkommen!";
            await setDoc(doc(db, "settings", "ticker"), { active: active, text: txt });
        };

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('b-'+id).classList.add('active');
            
            // Wenn der User auf Fun klickt, rendern wir die Seite neu, falls er gerade im Quiz steckte
            if(id === 'fun') {
                renderPages(); 
                if(db) setupFirebase(); // Listener neu starten
                setTimeout(initGames, 100);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.adminTrigger = () => {
            adminClicks++;
            if(adminClicks >= 5) {
                if(prompt("Passcode:") === CONFIG.adminPW) { window.showPage('admin'); }
                adminClicks = 0;
            }
        };

        function startCountdown() {
            setInterval(() => {
                const diff = new Date(CONFIG.date) - new Date();
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff / 3600000) % 24);
                const m = Math.floor((diff / 60000) % 60);
                const s = Math.floor((diff / 1000) % 60);
                
                const pad = (num) => String(num).padStart(2, '0');
                
                const t = document.getElementById('timer');
                if (t) {
                    t.innerText = diff > 0 
                        ? `${pad(d)}:${pad(h)}:${pad(m)}:${pad(s)}` 
                        : "00:00:00:00";
                }
                
                const now = new Date();
                const start = new Date(CONFIG.date);
                const end = new Date(start.getTime() + 12 * 3600000);
                let p = 0;
                if(now > start) p = Math.min(100, ((now - start) / (end - start)) * 100);
                if(document.getElementById('pBar')) {
                    document.getElementById('pBar').style.width = p + "%";
                    document.getElementById('pText').innerText = now < start ? "Tage · Stunden · Min · Sek" : (p < 100 ? "Live." : "Abgeschlossen.");
                }
                
                document.querySelectorAll('.schedule-item').forEach(item => {
                    const [sh, sm] = item.dataset.time.split(':');
                    const sTime = new Date(now).setHours(sh, sm, 0);
                    if(now >= sTime) {
                        document.querySelectorAll('.schedule-item').forEach(i => i.classList.remove('active-schedule'));
                        item.classList.add('active-schedule');
                    }
                });
            }, 1000);
        }

        function initGames() {
            const g = document.getElementById('bGrid');
            if (g) {
                g.innerHTML = ""; 
                const shuffledBingo = [...CONFIG.bingo].sort(() => 0.5 - Math.random()).slice(0, 9);
                shuffledBingo.forEach(b => {
                    const d = document.createElement('div');
                    d.className = "bingo-cell";
                    d.innerText = b;
                    d.onclick = () => { d.style.background = "var(--text)"; d.style.color = "var(--bg)"; d.style.transform = "scale(0.95)"; };
                    g.appendChild(d);
                });
            }

            const canvas = document.getElementById('scratch');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                const container = document.getElementById('scratch-container');
                
                canvas.width = container.offsetWidth;
                canvas.height = container.offsetHeight;

                ctx.fillStyle = '#86868b'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#f5f5f7';
                ctx.font = "bold 18px -apple-system, BlinkMacSystemFont, sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("FREIRUBBELN", canvas.width/2, canvas.height/2 + 6);

                let isDrawing = false;

                const scratch = (e) => {
                    if (!isDrawing) return;
                    const rect = canvas.getBoundingClientRect();
                    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.beginPath();
                    ctx.arc(x, y, 25, 0, Math.PI * 2);
                    ctx.fill();
                };

                canvas.addEventListener('mousedown', () => isDrawing = true);
                canvas.addEventListener('touchstart', () => isDrawing = true);
                window.addEventListener('mouseup', () => isDrawing = false);
                window.addEventListener('touchend', () => isDrawing = false);
                canvas.addEventListener('mousemove', scratch);
                canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });
            }
        }

        window.onload = init;
    </script>
</body>
</html>
