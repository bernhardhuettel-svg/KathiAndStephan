<!DOCTYPE html>
<html lang="de" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>KATHI & STEPHAN | THE WEDDING APP</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script defer type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        /* --- EINBINDUNG DER SCHWUNGSCHRIFT --- */
        @font-face {
            font-family: 'Brittany Signature';
            src: url('brittany-signature.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* --- FARBEN & THEME VARIABLEN --- */
        :root { 
            --bg: #FFFFFF; 
            --accent: #4A6B5B; 
            --accent-muted: #749C86;
            --surface: rgba(182, 215, 192, 0.4); 
            --surface-gradient: linear-gradient(135deg, rgba(182, 215, 192, 0.65) 0%, rgba(182, 215, 192, 0.25) 100%); 
            --text: #1C2B24; 
            --text-muted: #526B5D;
            --border-glass: rgba(255, 255, 255, 0.7); 
            --nav-bg: rgba(255, 255, 255, 0.75);
            --aura: none; 
        }
        
        [data-theme="dark"] { 
            --bg: #152019; 
            --surface: rgba(182, 215, 192, 0.15); 
            --surface-gradient: linear-gradient(135deg, rgba(182, 215, 192, 0.15) 0%, rgba(182, 215, 192, 0.05) 100%);
            --text: #E8F0EC; 
            --text-muted: #8EAB9D;
            --border-glass: rgba(182, 215, 192, 0.2);
            --nav-bg: rgba(21, 32, 25, 0.85);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Montserrat', sans-serif;
            font-weight: 300; 
            background-color: var(--bg);
            background-image: var(--aura);
            background-attachment: fixed;
            color: var(--text); 
            margin: 0; 
            padding-bottom: 120px; 
            overflow-x: hidden; 
            transition: background-color 0.4s ease;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h1, h2, h3, h4 { margin: 0; padding: 0; letter-spacing: -0.02em; }
        
        /* --- TYPOGRAFIE --- */
        h1 { 
            font-family: 'Brittany Signature', cursive;
            font-size: clamp(2.5rem, 10vw, 4rem); 
            font-weight: normal;
            line-height: 1.6; 
            text-align: center; 
            background: linear-gradient(180deg, var(--text) 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0px; 
            padding: 20px 20px 15px 20px; 
            white-space: nowrap; 
            position: relative;
            z-index: 1;
        }

        h2 { font-size: 2.2rem; font-weight: 400; color: var(--text); margin-bottom: 25px; }
        h3 { font-size: 1.6rem; font-weight: 500; color: var(--text); margin-bottom: 20px; text-align: center; }
        h4 { font-size: 1.1rem; font-weight: 500; color: var(--text); margin-bottom: 10px; }
        p { line-height: 1.6; font-size: 1rem; font-weight: 300; color: var(--text-muted); margin: 0 0 15px 0; }
        
        .cursive-text {
            font-family: 'Brittany Signature', cursive !important;
            font-size: clamp(2.5rem, 8vw, 3.5rem) !important;
            font-weight: normal !important;
            text-transform: none !important;
            letter-spacing: normal !important;
            color: var(--text) !important;
            line-height: 1.6 !important; 
            padding: 10px 0; 
        }

        /* --- ALLGEMEINE HILFSKLASSEN (UTILITIES) --- */
        .text-center { text-align: center !important; }
        .text-left { text-align: left !important; }
        .mt-0 { margin-top: 0 !important; }
        .mt-10 { margin-top: 10px !important; }
        .mt-15 { margin-top: 15px !important; }
        .mt-20 { margin-top: 20px !important; }
        .mt-25 { margin-top: 25px !important; }
        .mt-30 { margin-top: 30px !important; }
        .mb-0 { margin-bottom: 0 !important; }
        .mb-10 { margin-bottom: 10px !important; }
        .mb-15 { margin-bottom: 15px !important; }
        .mb-20 { margin-bottom: 20px !important; }
        .mb-25 { margin-bottom: 25px !important; }
        .mb-30 { margin-bottom: 30px !important; }
        .pb-25 { padding-bottom: 25px !important; }
        .flex-center { display: flex; justify-content: center; align-items: center; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        
        .divider { border: none; border-top: 1px solid var(--border-glass); margin: 25px 0; }
        .divider-small { width: 30px; margin: 0 auto; border-color: var(--border-glass); }

        /* --- SPEZIFISCHE KOMPONENTEN --- */
        .deco-heart { display: block; width: 32px; margin: 5px auto 35px auto; padding: 20px; box-sizing: content-box; opacity: 0.85; }
        [data-theme="dark"] .deco-heart { filter: invert(1); }
        
        .hero-subtitle { text-align: center; font-size: 0.9rem; color: var(--accent); font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 40px; }
        
        /* --- MENÜ KOMPONENTEN --- */
        .menu-header { margin-bottom: 10px; }
        .menu-footer { margin: 30px 0 5px 0; }
        .menu-badge { font-size: 0.8rem; font-weight: 400; text-transform: none; }
        .menu-highlight { color: var(--accent-muted); }
        
        .menu-category { font-size: 0.9rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.15em; color: var(--accent); margin: 35px 0 15px 0; border-bottom: 1px solid var(--border-glass); padding-bottom: 8px; }
        .menu-item { margin-bottom: 22px; }
        .menu-item-title { margin: 0 0 4px 0; font-weight: 500; font-size: 1.05rem; color: var(--text); text-transform: uppercase; }
        .menu-item-desc { margin: 0; font-size: 0.85rem; font-weight: 300; color: var(--text-muted); text-transform: uppercase; line-height: 1.6; }
        .menu-note { font-size: 0.8rem; font-weight: 400; color: var(--text-muted); text-transform: none; margin-top: -15px; margin-bottom: 25px; }

        /* --- FUN & SPIELE --- */
        .section-subtitle { text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; color: var(--text-muted); border-bottom: 1px solid var(--border-glass); padding-bottom: 5px; margin-bottom: 10px; }
        
        .scratch-container { position: relative; background: rgba(0,0,0,0.05); height: 160px; border-radius: 16px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .scratch-text { font-weight: 500; color: var(--text); font-size: 1.3rem; text-align: center; line-height: 1.4; }
        .scratch-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }
        
        .quiz-result-title { margin-bottom: 15px; text-align: center; }
        .quiz-result-text { text-align: center; font-size: 1.2rem; margin-bottom: 20px; color: var(--text); }
        .quiz-score-highlight { color: var(--accent); font-size: 1.5rem; font-weight: bold; }
        .quiz-header { font-size: 0.85rem; color: var(--text-muted); }
        .quiz-score-display { font-weight: 600; color: var(--accent); }
        .quiz-question { text-align: left; margin: 0 0 25px 0; font-size: 1.25rem; font-weight: 500; color: var(--text); line-height: 1.4; }
        .btn-quiz-option { margin-bottom: 10px; text-align: left; padding-left: 20px; }
        
        .tipp-badge { font-size: 1.1rem; color: var(--text); background: rgba(255,255,255,0.4); padding: 2px 8px; border-radius: 8px; }
        .mission-text { text-align: center; font-size: 1.2rem; font-weight: 500; margin: 30px 0; color: var(--text); transition: opacity 0.2s ease; }
        
        /* --- PLATZSUCHE --- */
        .search-result { text-align: center; margin-top: 20px; font-weight: 400; font-size: 1.1rem; line-height: 1.6; }
        .search-name { font-weight: 500; font-size: 1.4rem; color: var(--text); }
        .search-table-label { color: var(--text-muted); font-size: 0.9rem; }
        .search-table-value { color: var(--accent); font-weight: 600; }

        /* --- GALERIE UPLOAD --- */
        .upload-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; margin: 10px 0; }
        .pointer-none { pointer-events: none; }
        .file-input-hidden { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        .progress-container { display: none; width: 100%; background: rgba(0,0,0,0.05); border-radius: 3px; height: 6px; overflow: hidden; margin-top: 10px; }
        .progress-bar { background: var(--text); height: 100%; width: 0%; transition: width 0.3s; }
        .progress-text { text-align: center; font-size: 0.85rem; margin-top: 10px; font-weight: 400; display: none; }
        .btn-small { width: auto; padding: 8px 15px; font-size: 0.8rem; border-radius: 10px; }

        /* --- INFOS & GÄSTEBUCH --- */
        .textarea-large { height: 120px; resize: none; }
        .info-block { padding: 15px 0; border-bottom: 1px solid var(--border-glass); }
        .info-label { margin: 0 0 5px 0; font-size: 0.85rem; color: var(--text-muted); }
        .info-value { margin: 0; font-weight: 500; font-size: 1rem; color: var(--text); }
        
        .guestbook-entry { padding: 20px; margin-bottom: 15px; border-radius: 16px; background: rgba(0,0,0,0.03); position: relative; }
        .guestbook-text { margin: 0; line-height: 1.5; padding-right: 25px; color: var(--text); }
        .btn-del-corner { top: 15px; right: 15px; width: 22px; height: 22px; font-size: 10px; }

        /* --- ADMIN KONSOL --- */
        .card-admin { border: 1px solid #ff3b30; }
        .admin-title { color: #ff3b30; }
        .admin-hint { text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-top: 20px; }

        /* --- SPLASH SCREEN --- */
        .splash-title { font-size: clamp(3rem, 15vw, 5rem); margin-bottom: 0px; padding-bottom: 25px; line-height: 1.3; }
        .loader-track { width: 120px; height: 2px; background: var(--border-glass); border-radius: 2px; overflow: hidden; margin-top: 10px; }
        .loader-bar { width: 50%; height: 100%; background: var(--text); transform: translateX(-100%); animation: bootLoad 1.5s infinite ease-in-out; }

        /* --- THEME TOGGLE & TICKER --- */
        .theme-toggle { position: absolute; top: 20px; right: 20px; font-size: 1.2rem; cursor: pointer; z-index: 6500; opacity: 0.6; transition: opacity 0.3s; display: none; }
        body.admin-mode .theme-toggle { display: block; }
        .theme-toggle:active { opacity: 1; }

        #ticker-wrap { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); z-index: 6000; height: 32px; border-radius: 16px; display: none; overflow: hidden; font-weight: 500; line-height: 32px; font-size: 0.75rem; letter-spacing: 0.05em; padding: 0 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .ticker-text { display: inline-block; white-space: nowrap; padding-left: 100%; animation: ticker 15s linear infinite; text-transform: uppercase; }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        /* --- NAVIGATION --- */
        nav { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 500px;
            background: var(--nav-bg); 
            backdrop-filter: blur(35px) saturate(200%); 
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            display: flex; justify-content: space-around; padding: 15px 5px; border-radius: 30px; z-index: 4000; 
            border: 1px solid var(--border-glass); 
            border-top: 1px solid rgba(255, 255, 255, 0.9); 
            box-shadow: 0 10px 40px rgba(74, 107, 91, 0.15);
        }
        nav button { font-family: 'Montserrat', sans-serif; background: none; border: none; color: var(--text-muted); font-size: 0.60rem; font-weight: 500; cursor: pointer; flex: 1; display: flex; flex-direction: column; align-items: center; transition: color 0.2s ease; padding: 0 2px;}
        nav button.active { color: var(--text); font-weight: 600; }
        
        .nav-icon { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 4px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), stroke-width 0.2s; }
        nav button.active .nav-icon { stroke-width: 2; transform: scale(1.15); stroke: var(--accent); }
        nav button span { transition: transform 0.2s; }
        nav button.active span { transform: scale(1.05); color: var(--accent); }

        /* --- LAYOUT & KARTEN --- */
        .page { display: none; padding: 60px 20px 20px; max-width: 600px; margin: 0 auto; }
        .page.active { display: block; }
        
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .page.active .card { animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .page.active .card:nth-child(1) { animation-delay: 0.1s; }
        .page.active .card:nth-child(2) { animation-delay: 0.2s; }
        .page.active .card:nth-child(3) { animation-delay: 0.3s; }
        .page.active .card:nth-child(4) { animation-delay: 0.4s; }
        .page.active .card:nth-child(5) { animation-delay: 0.5s; }
        .page.active .card:nth-child(6) { animation-delay: 0.6s; }
        .page.active .card:nth-child(7) { animation-delay: 0.7s; }

        .page.active .timeline-item { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .page.active .timeline-item:nth-child(1) { animation-delay: 0.2s; }
        .page.active .timeline-item:nth-child(2) { animation-delay: 0.3s; }
        .page.active .timeline-item:nth-child(3) { animation-delay: 0.4s; }
        .page.active .timeline-item:nth-child(4) { animation-delay: 0.5s; }
        .page.active .timeline-item:nth-child(5) { animation-delay: 0.6s; }
        .page.active .timeline-item:nth-child(6) { animation-delay: 0.7s; }
        .page.active .timeline-item:nth-child(7) { animation-delay: 0.8s; }
        .page.active .timeline-item:nth-child(8) { animation-delay: 0.9s; }
        
        .card { 
            background: var(--surface-gradient); 
            backdrop-filter: blur(20px) saturate(160%); 
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border-radius: 24px; 
            padding: 24px; 
            margin-bottom: 30px; 
            border: 1px solid var(--border-glass); 
            border-top: 1px solid rgba(255, 255, 255, 0.9); 
            border-left: 1px solid rgba(255, 255, 255, 0.6); 
            position: relative; 
            box-shadow: 0 10px 30px rgba(74, 107, 91, 0.12); 
        }

        /* --- FORMULARE & BUTTONS --- */
        input, textarea {
            width: 100%; 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass); 
            border-top: 1px solid rgba(255, 255, 255, 0.9);
            color: var(--text); 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 400;
            padding: 16px; 
            border-radius: 14px; 
            font-size: 1.05rem; 
            min-height: 55px; 
            line-height: 1.5; 
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        [data-theme="dark"] input, [data-theme="dark"] textarea { background: rgba(0, 0, 0, 0.2); border-color: rgba(255,255,255,0.1); }
        input:focus, textarea:focus { 
            outline: none; 
            background: rgba(255, 255, 255, 0.95); 
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(182, 215, 192, 0.4);
        }
        
        .btn-action { 
            font-family: 'Montserrat', sans-serif; 
            background: linear-gradient(135deg, #749C86 0%, #4A6B5B 100%); 
            color: #FFFFFF; 
            border: 1px solid rgba(255,255,255,0.3); 
            padding: 16px; 
            border-radius: 14px; 
            font-weight: 600; 
            font-size: 0.95rem; 
            letter-spacing: 0.15em; 
            text-transform: uppercase; 
            width: 100%; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            box-shadow: 0 6px 20px rgba(74, 107, 91, 0.25);
            text-shadow: 0 1px 2px rgba(0,0,0,0.15);
        }
        .btn-action:active { transform: scale(0.97); box-shadow: 0 2px 10px rgba(74, 107, 91, 0.2); }
        
        .btn-del { 
            position: absolute; top: 12px; right: 12px; 
            background: var(--text); color: var(--bg); 
            border: none; border-radius: 50%; 
            width: 28px; height: 28px; font-weight: 500; cursor: pointer; 
            display: none; 
            align-items: center; justify-content: center; z-index: 100; font-size: 12px; 
        }
        body.admin-mode .btn-del { display: flex; }
        .hs-item .btn-del { position: relative; top: 0; right: 0; width: 26px; height: 26px; font-size: 11px; margin-left: 10px; }

        /* --- TIMELINE --- */
        .timer-display { font-size: 3rem; font-weight: 400; letter-spacing: -0.05em; text-align: center; font-variant-numeric: tabular-nums; margin: 20px 0; color: var(--text); }
        .timeline { display: flex; flex-direction: column; gap: 24px; }
        .timeline-item { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 4px; }
        .timeline-time { font-weight: 600; font-variant-numeric: tabular-nums; font-size: 0.95rem; color: var(--accent); letter-spacing: 0.05em; }
        .timeline-event { color: var(--text); font-weight: 400; line-height: 1.4; } 
        .active-schedule .timeline-time { color: var(--text); font-weight: 700; transform: scale(1.1); transition: transform 0.3s; }
        .active-schedule .timeline-event { color: var(--accent); font-weight: 600; }

        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 7000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
        
        /* --- BINGO & HIGHSCORE --- */
        #bGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .bingo-cell { 
            aspect-ratio: 1; 
            background: rgba(255, 255, 255, 0.5); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-glass); 
            border-top: 1px solid rgba(255,255,255,0.8);
            border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; text-align: center; font-size: 0.85rem; padding: 5px; cursor: pointer; font-weight: 500; transition: all 0.2s; color: var(--text); 
            box-shadow: 0 4px 15px rgba(74, 107, 91, 0.05);
        }
        [data-theme="dark"] .bingo-cell { background: rgba(255, 255, 255, 0.05); border-color: rgba(255,255,255,0.1); }

        .hs-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border-glass); font-size: 0.95rem; font-weight: 300;}
        .hs-item:last-child { border-bottom: none; }
        .hs-rank { font-weight: 500; color: var(--accent); width: 25px; display: inline-block; }
        .hs-name { flex: 1; font-weight: 400; color: var(--text); }
        .hs-score { font-weight: 500; color: var(--accent); }

        /* --- FOTOS & LIGHTBOX --- */
        #photoGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .photo-wrapper { position: relative; width: 100%; aspect-ratio: 1; border-radius: 16px; overflow: hidden; background: rgba(0,0,0,0.05); cursor: pointer; }
        .photo-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .progress-track { background: rgba(182, 215, 192, 0.3); height: 6px; border-radius: 3px; overflow: hidden; margin-top: 15px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); }
        [data-theme="dark"] .progress-track { background: rgba(255, 255, 255, 0.1); }
        #pBar { background: var(--accent); height: 100%; width: 0%; transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 3px; }

        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; align-items: center; pointer-events: none; width: 90%; max-width: 400px; }
        .toast { background: var(--nav-bg); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); color: var(--text); padding: 14px 24px; border-radius: 100px; font-weight: 400; font-size: 0.95rem; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border-glass); animation: toastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, toastOut 0.4s 2.6s ease-in forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes toastOut { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(-20px) scale(0.9); } }

        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 8000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; padding: 20px; }
        #lightbox.active { display: flex; opacity: 1; }
        #lightbox img { max-width: 100%; max-height: 90vh; border-radius: 16px; box-shadow: 0 10px 50px rgba(0,0,0,0.5); object-fit: contain; }
        .btn-close-lightbox { position: absolute; top: 30px; right: 30px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: none; border-radius: 50%; width: 44px; height: 44px; color: white; font-size: 22px; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

                                <p class="info-value">${CONFIG.location}</p>
                            </div>
                            
                            <button class="btn-action mt-15 mb-25" 
                                onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(CONFIG.location)}', '_blank')">
                                In Google Maps öffnen
                            </button>
                        
                            <div class="info-block">
                                <p class="info-label">WLAN</p>
                                <p class="info-value">Netz: ${CONFIG.wlan.ssid}<br>Benutzer: ${CONFIG.wlan.user}<br>Passwort: ${CONFIG.wlan.pw}</p>
                            </div>
                            
                            <button class="btn-action mt-15" onclick="location.href='tel:${CONFIG.taxi}'">
                                Taxi rufen
                            </button>
                        </div>
                </main>

                <main id="admin" class="page">
                    <div class="card card-admin">
                        <h3 class="admin-title">Admin Konsole</h3>
                        <input type="text" id="tIn" placeholder="Live-Ticker Text..." class="mb-15">
                        <button class="btn-action" onclick="window.setTicker(true)">Ticker aktivieren</button>
                        <button class="btn-action mt-10" onclick="window.setTicker(false)">Ticker aus</button>
                        <p class="admin-hint">Tipp: Du kannst nun in die anderen Tabs wechseln, um Einträge (Bilder, Highscore, etc.) zu löschen!</p>
                        <button class="btn-action mt-15" onclick="location.reload()">Admin-Modus beenden</button>
                    </div>

            `;
        }

        function setupGlobalFirebase() {
            onSnapshot(doc(db, "settings", "ticker"), (d) => {
                const data = d.data();
                const wrap = document.getElementById('ticker-wrap');
                if(data?.active) {
                    document.getElementById('ticker-content').innerText = "+++ " + data.text + " +++";
                    wrap.style.display = 'block';
                } else {
                    wrap.style.display = 'none';
                }
            });
        }

        function initFunListeners() {
            onSnapshot(query(collection(db, "highscores"), orderBy("score", "desc"), limit(10)), (snap) => {
                const list = document.getElementById('hsList'); if(!list) return;
                let html = "";
                let rank = 1;
                snap.forEach(d => {
                    const s = d.data();
                    html += `<div class="hs-item">
                        <span class="hs-rank">${rank}.</span>
                        <span class="hs-name">${s.name}</span>
                        <span class="hs-score">${s.score} Pkt.</span>
                        <button class="btn-del" onclick="window.deleteEntry('highscores','${d.id}')">✕</button>
                    </div>`;
                    rank++;
                });
                if(html === "") html = "<p class='info-label mt-0'>Noch keine Einträge. Zeig was du kannst!</p>";
                list.innerHTML = html;
            });

            onSnapshot(query(collection(db, "tipps"), orderBy("time", "desc")), (snap) => {
                const list = document.getElementById('tippList'); if(!list) return;
                let html = "";
                snap.forEach(d => {
                    const s = d.data();
                    html += `<div class="hs-item">
                        <span class="hs-name" style="font-weight: 500;">${s.name}</span>
                        <span class="tipp-badge">${s.tipp}</span>
                        <button class="btn-del" onclick="window.deleteEntry('tipps','${d.id}')">✕</button>
                    </div>`;
                });
                if(html === "") html = "<p class='info-label mt-0'>Noch keine Tipps abgegeben.</p>";
                list.innerHTML = html;
            });
        }

        function initInfoListeners() {
            onSnapshot(query(collection(db, "guestbook"), orderBy("time", "desc")), (snap) => {
                const list = document.getElementById('wList'); if(!list) return;
                let html = "";
                snap.forEach(d => {
                    html += `<div class="guestbook-entry">
                        <p class="guestbook-text">${d.data().msg}</p>
                        <button class="btn-del btn-del-corner" onclick="window.deleteEntry('guestbook','${d.id}')">✕</button>
                    </div>`;
                });
                list.innerHTML = html;
            });
        }

        function initGalleryListener() {
            if(photoUnsubscribe) photoUnsubscribe();
            
            photoUnsubscribe = onSnapshot(query(collection(db, "photos"), orderBy("time", "desc"), limit(photoLimit)), (snap) => {
                const grid = document.getElementById('photoGrid'); if(!grid) return;
                let html = "";
                
                snap.forEach(d => {
                    const data = d.data();
                    const displayUrl = data.thumb || data.url;
                    html += `
                        <div class="photo-wrapper" onclick="window.showLightbox('${data.url}')">
                            <img src="${displayUrl}" loading="lazy">
                            
                            <button onclick="event.stopPropagation(); window.downloadPhoto('${data.url}')" 
                                    style="position: absolute; bottom: 8px; right: 8px; background: var(--text); color: var(--bg); border: none; border-radius: 50%; width: 34px; height: 34px; cursor: pointer; font-size: 16px; z-index: 10; display: flex; align-items: center; justify-content: center;">
                                ↓
                            </button>
                            
                            <button class="btn-del" onclick="event.stopPropagation(); window.deleteEntry('photos','${d.id}')">✕</button>
                         </div>`;
                });
                grid.innerHTML = html;

                const btn = document.getElementById('loadMoreBtn');
                if(btn) {
                    btn.style.display = snap.docs.length >= photoLimit ? 'block' : 'none';
                }
            });
        }

        window.loadMorePhotos = () => {
            photoLimit += 6; 
            initGalleryListener();
        };

        function setupSearchDebounce() {
            document.getElementById('gSearch').oninput = (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const v = e.target.value.toLowerCase().trim();
                    const res = document.getElementById('gRes');
                    
                    if(v.length < 2) { res.innerHTML = ""; return; } 

                    let matches = [];
                    CONFIG.seating.forEach(tisch => {
                        tisch.n.forEach(name => {
                            if(name.toLowerCase().includes(v)) {
                                matches.push(`<span class="search-name">${name}</span><br><span class="search-table-label">Dein Platz:</span> <span class="search-table-value">${tisch.t}</span>`);
                            }
                        });
                    });

                    if(matches.length > 0) {
                        res.innerHTML = matches.join('<br><br><hr class="divider divider-small"><br>');
                    } else {
                        res.innerHTML = "Nicht gefunden.";
                    }
                }, 300); 
            };
        }

        window.downloadAllPhotos = async () => {
            if(!confirm("Möchtest du wirklich alle Fotos als ZIP-Datei herunterladen? Bei sehr vielen Bildern kann das einen Moment dauern.")) return;
            
            const zipProgress = document.getElementById('zipProgress');
            const zipBar = document.getElementById('zipBar');
            const zipText = document.getElementById('zipText');
            
            zipProgress.style.display = 'block';
            zipText.style.display = 'block';
            zipBar.style.width = '5%';
            zipText.innerText = 'Lade Bilddatenbank...';

            try {
                const q = query(collection(db, "photos"), orderBy("time", "desc"));
                const querySnapshot = await getDocs(q);
                
                const urls = [];
                querySnapshot.forEach((doc) => {
                    urls.push(doc.data().url);
                });

                if(urls.length === 0) {
                    window.showToast("Es gibt noch keine Fotos zum Herunterladen.");
                    zipProgress.style.display = 'none'; zipText.style.display = 'none';
                    return;
                }

                const zip = new JSZip();
                const folder = zip.folder("Hochzeit_Fotos");
                let count = 0;
                
                for(let i = 0; i < urls.length; i++) {
                    try {
                        const response = await fetch(urls[i]);
                        const blob = await response.blob();
                        const filename = `Hochzeit_Foto_${i+1}.jpg`;
                        folder.file(filename, blob);
                        count++;
                        
                        let percent = Math.floor(5 + (count / urls.length) * 85);
                        zipBar.style.width = percent + '%';
                        zipText.innerText = `Verpacke Bild ${count} von ${urls.length}...`;
                    } catch(err) {
                        console.warn("Konnte Bild nicht zum ZIP hinzufügen:", urls[i]);
                    }
                }
                
                zipText.innerText = 'Erstelle ZIP-Datei... Bitte warten.';
                zipBar.style.width = '95%';

                const content = await zip.generateAsync({type:"blob"});
                saveAs(content, "Hochzeit_Kathi_Stephan.zip");
                
                zipBar.style.width = '100%';
                zipText.innerText = 'Download erfolgreich gestartet!';
                
                setTimeout(() => { 
                    zipProgress.style.display='none'; 
                    zipText.style.display='none'; 
                }, 3000);

            } catch (error) {
                console.error(error);
                window.showToast("Fehler beim Erstellen der ZIP-Datei.");
                zipProgress.style.display = 'none'; 
                zipText.style.display = 'none';
            }
        };

        window.nextMission = () => {
            let nextIdx = lastMissionIdx;
            while(nextIdx === lastMissionIdx) {
                nextIdx = Math.floor(Math.random() * CONFIG.missions.length);
            }
            lastMissionIdx = nextIdx;
            
            const txt = document.getElementById('mTxt');
            if (txt) {
                txt.style.opacity = '0'; 
                setTimeout(() => {
                    txt.innerText = `"${CONFIG.missions[nextIdx]}"`;
                    txt.style.opacity = '1'; 
                }, 200);
            }
        };

        window.startQuiz = () => {
            const n = document.getElementById('qNameInput').value.trim();
            if(!n) { window.showToast("Bitte gib deinen Vornamen ein!"); return; }
            window.qName = n;
            window.qStep = 0;
            window.qScore = 0;
            
            document.getElementById('qStartScreen').style.display = 'none';
            document.getElementById('qActiveScreen').style.display = 'block';
            window.runQuiz();
        };

        window.runQuiz = () => {
            const q = CONFIG.quiz[window.qStep];
            const qc = document.getElementById('qActiveScreen');
            
            if(!q) { 
                qc.innerHTML = `
                    <h3 class="quiz-result-title">Quiz beendet!</h3>
                    <p class="quiz-result-text">Du hast <b class="quiz-score-highlight">${window.qScore}</b> Punkte erreicht!</p>
                    <button class="btn-action" onclick="window.resetQuiz()">Zurück zur Übersicht</button>
                `;
                
                if(db && window.qName) {
                    addDoc(collection(db, "highscores"), { 
                        name: window.qName, 
                        score: window.qScore, 
                        time: serverTimestamp() 
                    }).catch(e => window.showToast("Fehler beim Speichern."));
                }
                return; 
            }
            
            let optionsHtml = q.o.map((opt, idx) => 
                `<button class="btn-action btn-quiz-option" onclick="window.answerQ(${idx})">${opt}</button>`
            ).join('');
            
            qc.innerHTML = `
                <div class="flex-between quiz-header mb-15">
                    <span>Frage ${window.qStep + 1} / ${CONFIG.quiz.length}</span>
                    <span class="quiz-score-display">${window.qScore} Pkt</span>
                </div>
                <p class="quiz-question">${q.q}</p>
                ${optionsHtml}
            `;
        };

        window.answerQ = (selectedIndex) => {
            if(selectedIndex === CONFIG.quiz[window.qStep].a) {
                window.qScore++;
            }
            window.qStep++;
            window.runQuiz();
        };

        window.resetQuiz = () => {
            document.getElementById('qActiveScreen').style.display = 'none';
            document.getElementById('qStartScreen').style.display = 'block';
            document.getElementById('qNameInput').value = "";
        };

        window.submitTipp = async () => {
            const name = document.getElementById('tippName').value.trim();
            const tipp = document.getElementById('tippValue').value.trim();
            
            if(!name || !tipp) {
                window.showToast("Bitte gib deinen Namen und einen Tipp ein!");
                return;
            }
            
            try {
                await addDoc(collection(db, "tipps"), { 
                    name: name, 
                    tipp: tipp, 
                    time: serverTimestamp() 
                });
                
                document.getElementById('tippName').value = "";
                document.getElementById('tippValue').value = "";
                window.showToast("⚽ Tipp erfolgreich abgegeben!");
            } catch (error) {
                window.showToast("Fehler beim Speichern des Tipps.");
            }
        };

        window.deleteEntry = async (coll, id) => { 
            if (confirm("Möchtest du diesen Eintrag wirklich löschen?")) {
                try {
                    const { doc, deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
                    await deleteDoc(doc(db, coll, id));
                    window.showToast("✅ Gelöscht!");
                } catch (error) {
                    window.showToast("Fehler beim Löschen.");
                }
            }
        };

        window.downloadPhoto = async (url) => {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = "hochzeit_foto_" + Date.now() + ".jpg";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) { window.open(url, '_blank'); }
        };

        window.uploadPhoto = async (input) => {
            if(!input.files || !input.files[0]) return;
            let file = input.files[0];
            
            const progressContainer = document.getElementById('uploadProgress');
            const progressBar = document.getElementById('uploadBar');
            const progressText = document.getElementById('uploadText');

            progressContainer.style.display = 'block';
            progressBar.style.width = '10%';
            progressText.innerText = 'Vorbereiten...';

            try {
                if(window.imageCompression) {
                    file = await imageCompression(file, { maxSizeMB: 1, maxWidthOrHeight: 1920 });
                }

                progressText.innerText = 'Hochladen...';
                progressBar.style.width = '40%';

                let formData = new FormData();
                formData.append("image", file);

                const response = await fetch("https://api.imgbb.com/1/upload?key=80d19d6d4d10e14c8d276c7d80c63b05&expiration=15552000", {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();

                if(result.success) {
                    progressBar.style.width = '80%';
                    progressText.innerText = 'Speichern...';

                    await addDoc(collection(db, "photos"), { 
                        url: result.data.url, 
                        thumb: result.data.thumb.url,
                        time: serverTimestamp() 
                    });

                    progressBar.style.width = '100%';
                    progressText.innerText = 'Erfolgreich!';
                    window.showToast("✅ Foto hochgeladen!");
                    setTimeout(() => { progressContainer.style.display = 'none'; input.value = ""; }, 2000);
                }
            } catch (error) {
                window.showToast("Fehler beim Hochladen.");
                progressContainer.style.display = 'none';
            }
        };

        window.addWish = async () => {
            const i = document.getElementById('wIn');
            if(!i.value) return;
            await addDoc(collection(db, "guestbook"), { msg: i.value, time: serverTimestamp() });
            i.value = ""; 
            window.showToast("💌 Nachricht gesendet!");
        };

        window.setTicker = async (active) => {
            const txt = document.getElementById('tIn').value || "Willkommen!";
            await setDoc(doc(db, "settings", "ticker"), { active: active, text: txt });
            window.showToast("Ticker aktualisiert!");
        };

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('b-'+id).classList.add('active');
            
            if(id === 'fun') {
                if(!funLoaded && db) { initFunListeners(); funLoaded = true; }
                setTimeout(initGames, 50); 
            }
            if(id === 'info') {
                if(!infoLoaded && db) { initInfoListeners(); infoLoaded = true; }
            }
            if(id === 'gal') {
                if(!galLoaded && db) { initGalleryListener(); galLoaded = true; }
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.adminTrigger = () => {
            adminClicks++;
            if(adminClicks >= 5) {
                adminClicks = 0; 
                if(document.body.classList.contains('admin-mode')) {
                    window.showPage('admin');
                } else {
                    if(prompt("Passcode:") === CONFIG.adminPW) { 
                        document.body.classList.add('admin-mode');
                        window.showPage('admin'); 
                        window.showToast("✅ Admin-Modus aktiv! Lösch-Buttons sichtbar.");
                    }
                }
            }
        };

        function startCountdown() {
            setInterval(() => {
                const diff = new Date(CONFIG.date) - new Date();
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff / 3600000) % 24);
                const m = Math.floor((diff / 60000) % 60);
                const s = Math.floor((diff / 1000) % 60);
                
                const pad = (num) => String(num).padStart(2, '0');
                
                const t = document.getElementById('timer');
                if (t) {
                    t.innerText = diff > 0 
                        ? `${pad(d)}:${pad(h)}:${pad(m)}:${pad(s)}` 
                        : "00:00:00:00";
                }
                
                const now = new Date();
                const start = new Date(CONFIG.date);
                const end = new Date(start.getTime() + 12 * 3600000);
                let p = 0;
                if(now > start) p = Math.min(100, ((now - start) / (end - start)) * 100);
                if(document.getElementById('pBar')) {
                    document.getElementById('pBar').style.width = p + "%";
                    document.getElementById('pText').innerText = now < start ? "Tage · Stunden · Min · Sek" : (p < 100 ? "Live." : "Abgeschlossen.");
                }
                
                let activeIdx = 0;
                let prevH = -1;
                let dayOffset = 0;
                const sItems = document.querySelectorAll('.schedule-item');
                sItems.forEach((item, index) => {
                    const [sh, sm] = item.dataset.time.split(':').map(Number);
                    if (sh < prevH) dayOffset = 1; // Mitternacht überschritten
                    prevH = sh;
                    
                    const sDate = new Date(CONFIG.date);
                    sDate.setDate(sDate.getDate() + dayOffset);
                    sDate.setHours(sh, sm, 0, 0);
                    
                    if (now >= sDate) {
                        activeIdx = index;
                    }
                });
                
                sItems.forEach((i, idx) => {
                    if (idx === activeIdx) i.classList.add('active-schedule');
                    else i.classList.remove('active-schedule');
                });
            }, 1000);
        }

        function initGames() {
            const g = document.getElementById('bGrid');
            if (g && g.innerHTML.trim() === "") { 
                const shuffledBingo = [...CONFIG.bingo].sort(() => 0.5 - Math.random()).slice(0, 9);
                
                let bingoState = [false, false, false, false, false, false, false, false, false];
                let hasWon = false;
                
                const winLines = [
                    [0, 1, 2], [3, 4, 5], [6, 7, 8], 
                    [0, 3, 6], [1, 4, 7], [2, 5, 8], 
                    [0, 4, 8], [2, 4, 6]             
                ];

                shuffledBingo.forEach((b, index) => {
                    const d = document.createElement('div');
                    d.className = "bingo-cell";
                    d.innerText = b;
                    
                    d.onclick = () => { 
                        if (hasWon || bingoState[index]) return; 

                        d.style.background = "var(--accent)"; 
                        d.style.color = "var(--bg)"; 
                        d.style.transform = "scale(0.95)"; 
                        d.style.border = "none"; 

                        bingoState[index] = true;

                        for (let line of winLines) {
                            const [a, b, c] = line;
                            if (bingoState[a] && bingoState[b] && bingoState[c]) {
                                hasWon = true; 
                                
                                const prizeMsg = document.getElementById('bingo-prize');
                                if(prizeMsg) {
                                    prizeMsg.style.display = "block";
                                }
                                
                                window.showToast("🎉 BINGO! Du hast gewonnen!");
                                break; 
                            }
                        }
                    };
                    g.appendChild(d);
                });
            }

            const canvas = document.getElementById('scratch');
            const container = document.getElementById('scratch-container');
            
            if (canvas && container.offsetWidth > 0 && !canvas.isInitialized) {
                const prizeElement = document.getElementById('scratch-prize');
                if (prizeElement) {
                    const isWinner = Math.random() > 0.5;
                    if (isWinner) {
                        prizeElement.innerText = "1x Lolli! 🍭";
                        prizeElement.style.color = "var(--accent)";
                    } else {
                        prizeElement.innerText = "Niete! 😢";
                        prizeElement.style.color = "var(--text-muted)";
                    }
                }

                const ctx = canvas.getContext('2d');
                
                canvas.width = container.offsetWidth;
                canvas.height = container.offsetHeight;

                ctx.fillStyle = '#aa8a8d'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#ffffff'; 
                ctx.font = "bold 18px 'Montserrat', sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("FREIRUBBELN", canvas.width/2, canvas.height/2 + 6);

                let isDrawing = false;

                const scratch = (e) => {
                    if (!isDrawing) return;
                    const rect = canvas.getBoundingClientRect();
                    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.beginPath();
                    ctx.arc(x, y, 25, 0, Math.PI * 2);
                    ctx.fill();
                };

                canvas.addEventListener('mousedown', () => isDrawing = true);
                canvas.addEventListener('touchstart', () => isDrawing = true);
                window.addEventListener('mouseup', () => isDrawing = false);
                window.addEventListener('touchend', () => isDrawing = false);
                canvas.addEventListener('mousemove', scratch);
                canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });
                
                canvas.isInitialized = true; 
            }
        }

        window.onload = init;
    </script>
